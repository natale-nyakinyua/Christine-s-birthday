<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Christine 💖 Cinematic Birthday</title>

<style>
html {
  scroll-behavior: smooth;
}

body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  color:white;
  overflow-x:hidden;
  background: radial-gradient(circle at top, #ff4d6d, #1a0010);
  scroll-snap-type: y mandatory;
}

/* NAV */
nav {
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:20px;
  padding:15px;
  background:rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  z-index:1000;
}

nav a {
  color:white;
  text-decoration:none;
  font-weight:bold;
  opacity:0.8;
}

nav a:hover { opacity:1; }

section {
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
  scroll-snap-align: start;
  padding:80px 20px;
}

/* INTRO */
#intro {
  background:black;
  position:fixed;
  inset:0;
  z-index:9999;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

#intro button {
  padding:15px 30px;
  border:none;
  border-radius:30px;
  background:#ff4d6d;
  color:white;
  font-size:1.2rem;
  cursor:pointer;
}

h1 {
  font-size:3rem;
  animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
  from { text-shadow:0 0 10px #ff4d6d; }
  to { text-shadow:0 0 25px #ff99ac; }
}

.card {
  background:white;
  color:#ff4d6d;
  padding:25px;
  border-radius:20px;
  max-width:650px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  transform:translateY(40px);
  opacity:0;
  transition:all 1s ease;
}

.card.show {
  transform:translateY(0);
  opacity:1;
}

.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
  margin-top:15px;
}

.gallery img {
  width:100%;
  border-radius:12px;
  transition:0.3s;
}

.gallery img:hover {
  transform:scale(1.05);
}

.btn {
  margin-top:15px;
  display:inline-block;
  padding:10px 20px;
  background:#ff4d6d;
  color:white;
  border-radius:20px;
  text-decoration:none;
  cursor:pointer;
}

/* HEARTS */
.heart {
  position:fixed;
  bottom:-10px;
  color:#ff4d6d;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  to { transform:translateY(-100vh); opacity:0; }
}

/* SECTIONS COLORS */
#hero { background: radial-gradient(circle at top, #ff4d6d, #1a0010); }
#message { background: linear-gradient(135deg, #1a0010, #ff4d6d); }
#gallerySection { background: linear-gradient(135deg, #ff4d6d, #2a001a); }
#secretSection { background:black; }

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <h2>Hey Christine 💖</h2>
  <button onclick="startExperience()">Tap to open your surprise dear🎬</button>
</div>

<!-- NAV -->
<nav>
  <a href="#hero">Home</a>
  <a href="#message">Message</a>
  <a href="#gallerySection">Gallery</a>
  <a href="#secretSection">Secret</a>
</nav>

<!-- HERO -->
<section id="hero">
  <h1>Happy Birthday Christine 🎂
  Lots of love darling</h1>
</section>

<!-- MESSAGE -->
<section id="message">
  <div class="card" id="card1">
    <p id="typed"></p>
    <button class="btn" onclick="playVoice()">Play Voice 🎙️</button>
  </div>
</section>

<!-- GALLERY -->
<section id="gallerySection">
  <div class="card" id="card2">
    <h2>Your Memories 📸</h2>
    <div class="gallery">
      <img src="img1.jpeg">
      <img src="img2.jpeg">
      <img src="img3.jpeg">
      <img src="img4.jpeg">
      <img src="img5.jpeg">
      <img src="img6.jpeg">
      <img src="img7.jpeg">
      <img src="img8.jpeg">
      <img src="img9.jpeg">
      
    </div>
  </div>
</section>

<!-- SECRET -->
<section id="secretSection">
  <div class="card" id="card3">
    <h2>Secret 💎</h2>
    <video autoplay loop muted playsinline width="100%">
  <source src="WhatsApp Video 2026-04-05 at 13.26.51.mp4" type="video/mp4">
</video>
    <p>This is something I don’t say enough… You matter more than you know 💖</p>
  </div>
</section>

<!-- AUDIO -->
<audio id="music" loop>
  <source src="BRENT FAIYAZ - ALL MINE [Official Video].mp3" type="audio/mpeg">
</audio>

<audio id="voice">
  <source src="WhatsApp Audio 2026-04-05 at 11.22.02.mp3" type="audio/mpeg">
</audio>

<script>

function startExperience(){
  document.getElementById('intro').style.display='none';
  document.getElementById('music').play();
  typeText();
  observeCards();
}

// typing
const text = "Christine... 💕 Happy Birthday Christine 🎉💛 I’m really grateful we once got to be deskmates because that’s where I got to see how genuinely kind, supportive, and trustworthy you are (From when you talked to the rest of our friends who are now our friends to include me in the South Africa cultural-that was so nice of you ,thank you for helping me experience that )—you’ve always been someone I could talk to and feel understood. Beyond that, I just want you to know how beautiful and amazing you are, both inside and out. You carry such a  good energy that makes people feel safe around you, and that’s rare. I truly hope this new year of your life brings you nothing but success, growth, happiness, and everything your heart has been working for. You deserve the absolute best in every way. I alslo hope this birthday brings you everything you ever wished for.";
let i=0;
function typeText(){
  if(i<text.length){
    document.getElementById('typed').innerHTML += text.charAt(i);
    i++;
    setTimeout(typeText,40);
  }
}

function playVoice(){
  document.getElementById('voice').play();
}

// reveal animation
function observeCards(){
  const cards=document.querySelectorAll('.card');
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        e.target.classList.add('show');
      }
    });
  },{threshold:0.3});

  cards.forEach(c=>obs.observe(c));
}

// hearts
function createHeart(){
  const heart=document.createElement('div');
  heart.classList.add('heart');
  heart.innerHTML='❤️';
  heart.style.left=Math.random()*100+'vw';
  heart.style.animationDuration=(Math.random()*3+2)+'s';
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),5000);
}
setInterval(createHeart,200);
</script>

</body>
</html>
